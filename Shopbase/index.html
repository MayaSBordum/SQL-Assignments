<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Box</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
        }

        .kpi-box {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .kpi-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .kpi-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .kpi-change {
            font-size: 13px;
            font-weight: 600;
        }

        .kpi-change.positive {
            color: #28a745;
        }

        .kpi-change.negative {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="kpi-container">
        <div class="kpi-box">
            <div class="kpi-label">Total Revenue</div>
            <div class="kpi-value">$45,230</div>
            <div class="kpi-change positive">↑ 12.5% vs last month</div>
        </div>

        <div class="kpi-box">
            <div class="kpi-label">Orders</div>
            <div class="kpi-value">1,204</div>
            <div class="kpi-change positive">↑ 8.2% vs last month</div>
        </div>

        <div class="kpi-box">
            <div class="kpi-label">Customers</div>
            <div class="kpi-value">832</div>
            <div class="kpi-change negative">↓ 3.1% vs last month</div>
        </div>

        <div class="kpi-box">
            <div class="kpi-label">Avg Order Value</div>
            <div class="kpi-value">$37.50</div>
            <div class="kpi-change positive">↑ 5.3% vs last month</div>
        </div>
    </div>
</body>
</html>
